---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant-deployment
  namespace: homeassistant
  labels:
    app: homeassistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homeassistant
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - image: ghcr.io/home-assistant/home-assistant:stable
          name: homeassistant
          resources: {}
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - NET_BROADCAST
          volumeMounts:
            - mountPath: /config
              name: homeassistant-opt-volume
            - mountPath: /etc/localtime
              name: localtime
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: homeassistant-opt-volume
          persistentVolumeClaim:
            claimName: homeassistant-opt-claim
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File
