---
- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s_install.sh
    mode: "0755"

- name: Install k3s
  ansible.builtin.command: /tmp/k3s_install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
  changed_when: false

- name: Enable and start k3s service
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true

- name: Wait for k3s node to be ready
  ansible.builtin.command: >
    k3s kubectl wait --for=condition=ready node --all --timeout={{ k8s_wait_timeout }}
  changed_when: false

- name: Create .kube directory for "{{ username }}"
  ansible.builtin.file:
    path: "/home/{{ username }}/.kube"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0750"

- name: Copy k3s kubeconfig for "{{ username }}"
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ username }}/.kube/config"
    remote_src: true
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0600"

- name: Export KUBECONFIG in .bashrc for "{{ username }}"
  ansible.builtin.lineinfile:
    path: "/home/{{ username }}/.bashrc"
    regexp: "^export KUBECONFIG="
    line: "export KUBECONFIG=/home/{{ username }}/.kube/config"
    state: present

- name: Add bash completion for kubectl
  ansible.builtin.lineinfile:
    path: "/home/{{ username }}/.bashrc"
    regexp: '^source <\(kubectl completion bash'
    line: "source <(kubectl completion bash)"
    state: present
