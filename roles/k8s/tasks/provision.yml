# Wait for pods
- name: Wait for pods to be ready ({{ k8s_wait_timeout }} timeout)
  ansible.builtin.command: >
    kubectl wait --for=condition=ready pods --all --all-namespaces --timeout={{ k8s_wait_timeout }}
