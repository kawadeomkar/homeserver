---
# Home assistant

- name: Start kubernetes homeassistant service
  ansible.builtin.command: kubectl apply -f {{ k8s_manifests_path }}/homeassistant
  register: k8s_apply
  changed_when: "'configured' in k8s_apply.stdout"

