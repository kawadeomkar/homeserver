---
# setup.yml
packages:
  - vim
  - htop
  - curl
  - tmux
  - neofetch
  - speedtest-cli
  - git-all
  - snapd
  - python3-pip
  - net-tools
  - wireshark
  - nmap
  # Minikube <1.23
  - conntrack
  - lm-sensors
  - vainfo
  - nfs-common

# env.yml
is_hosting_music_bot: false

# nfs.yml
is_nfs: false

# ssh.yml
ssh_port: 22
ssh_public_key_file: "~/.ssh/hs.pub"

# debian
# ubuntu-ufw.yml
ufw_rules:
  - rule: allow
    interface: "{{ ansible_default_ipv4['interface'] }}"
    to_port: 22
    protocol: tcp
