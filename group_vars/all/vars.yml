---
shell: /usr/bin/bash

discord_token: "{{ vault_discord_token }}"

username: omkar
password: TODO

# ssh
security_ssh_allowed_users: ["omkar", "vagrant", "om"]

# TODO: networking
lan_subnet: 10.0.0.0/24
lan_base: "{{ lan_subnet | regex_replace('.0/[0-9]{2}', '') }}"
# homeserver_ip: "{{ lan_base }}.18"

# NFS
nfs_ip: 10.0.25.65
nfs_path: /mnt/nfs
nfs_src_path: /mnt/nvme_gen3
nfs_owner_uid: 1000
nfs_owner_gid: 1000

# Filesystem
services_base_dir: /opt
service_dirs:
  - hass
  - portainer
  - media/data
  - sabnzbd/config
  - jellyfin/config
  - sonarr/config
  - radarr/config
  - prowlarr/config
  - jellyseerr/config
  - nextcloud/db
  - nextcloud/server
  - homarr/configs
  - homarr/icons
  - dashy/item-icons
  - grafana/storage
  - filebrowser
  - frigate/storage
  - frigate-db
  - photoprism/originals
  - photoprism/import
  - photoprism/storage
  - photoprism/db

# Homeserver repo
homeserver_repo_path: /homeserver

# Python
python_externally_managed_path: /usr/lib/python3.12/EXTERNALLY-MANAGED

# Kubernetes
k8s_manifests_path: /k8s
k8s_wait_timeout: 300s
k3s_version: ""  # empty string installs latest stable
metallb_cidr: 192.168.1.0/24
